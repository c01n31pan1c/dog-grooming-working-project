name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATE_DIR="/root/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TEMPLATE_DIR"
          # Check if templates already exist from Docker image
          if [ ! -f "$TEMPLATE_DIR/web_release.zip" ]; then
            echo "Downloading Godot 4.3 export templates..."
            wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
            cd /tmp && unzip -q templates.tpz
            cp /tmp/templates/* "$TEMPLATE_DIR/" 2>/dev/null || true
          fi
          echo "Available templates:"
          ls "$TEMPLATE_DIR/"

      - name: Import project
        run: godot --headless --import
        timeout-minutes: 3

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add COI Service Worker
        run: |
          wget -q -O build/web/coi-serviceworker.js \
            https://raw.githubusercontent.com/nicoschi/coi-serviceworker/main/coi-serviceworker.min.js || true
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
