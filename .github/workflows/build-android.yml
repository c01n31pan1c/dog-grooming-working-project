name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          for BASE in "/root" "/github/home" "$HOME"; do
            TEMPLATE_DIR="$BASE/.local/share/godot/export_templates/4.3.stable"
            mkdir -p "$TEMPLATE_DIR"
          done
          echo "Downloading Godot 4.3 export templates..."
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          for BASE in "/root" "/github/home" "$HOME"; do
            TEMPLATE_DIR="$BASE/.local/share/godot/export_templates/4.3.stable"
            cp /tmp/templates/* "$TEMPLATE_DIR/" 2>/dev/null || true
          done

      - name: Setup Android SDK and keystore
        run: |
          # Configure Godot editor settings with Android SDK path
          for BASE in "/root" "/github/home" "$HOME"; do
            SETTINGS_DIR="$BASE/.config/godot"
            mkdir -p "$SETTINGS_DIR"
            cat > "$SETTINGS_DIR/editor_settings-4.tres" << 'SETTINGS'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/debug_keystore = "/tmp/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          SETTINGS
          done
          # Generate ephemeral debug keystore
          keytool -genkeypair -v -keystore /tmp/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Import project
        run: godot --headless --import
        timeout-minutes: 3

      - name: Create build directory
        run: mkdir -p build/android

      - name: Build Android APK
        run: godot --headless --export-debug "Android" build/android/game.apk
        timeout-minutes: 10

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
          retention-days: 30
