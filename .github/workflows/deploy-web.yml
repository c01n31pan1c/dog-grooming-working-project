name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          # Godot in this container uses /github/home as HOME
          for BASE in "/root" "/github/home" "$HOME"; do
            TEMPLATE_DIR="$BASE/.local/share/godot/export_templates/4.3.stable"
            mkdir -p "$TEMPLATE_DIR"
          done
          echo "Downloading Godot 4.3 export templates..."
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          for BASE in "/root" "/github/home" "$HOME"; do
            TEMPLATE_DIR="$BASE/.local/share/godot/export_templates/4.3.stable"
            cp /tmp/templates/* "$TEMPLATE_DIR/" 2>/dev/null || true
          done
          echo "Templates installed. Checking /github/home path:"
          ls /github/home/.local/share/godot/export_templates/4.3.stable/ | head -5

      - name: Import project
        run: godot --headless --import
        timeout-minutes: 3

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Add COI Service Worker
        run: |
          wget -q -O build/web/coi-serviceworker.js \
            https://raw.githubusercontent.com/nicoschi/coi-serviceworker/main/coi-serviceworker.min.js || true
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
